<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
:root{
    --board-size:min(92vw,420px);

    --bg1:#f1f2fb;
    --bg2:#e4e8f6;

    --board:#c5cbe6;
    --board-dark:#adb6da;

    --panel1:#bdb4ee;
    --panel2:#a493e4;

    --panel-label:#f7f7ff;
    --panel-value:#ffffff;

    --text:#5a5f86;
    --sub:#747a9f;

    --gap:10px;

    --pad-x:10px;
    --pad-top:12px;
    --pad-bottom:10px;

    --tile-radius:8px;
}
*{ box-sizing:border-box; }

html, body{
    margin:0;
    min-height:100%;
}

html{
    overflow-x:hidden;
    overflow-y:auto;
}

body{
    background:
        radial-gradient(circle at top, #ffffff 0%, var(--bg1) 38%, var(--bg2) 100%);
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    padding:18px 0 24px;
    color:var(--text);
    overflow-x:hidden;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
}

#app{
    width:var(--board-size);
    display:flex;
    flex-direction:column;
    align-items:stretch;
    position:relative;
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    flex:0 0 auto;
}

.version-note{
    font-size:12px;
    color:#8a90b0;
    margin-bottom:8px;
    text-align:center;
}

.loading-note{
    display:none;
    margin-bottom:14px;
    padding:10px 12px;
    border-radius:12px;
    background:rgba(255,255,255,.66);
    color:#7d84a2;
    font-size:13px;
    text-align:center;
    box-shadow:
        0 6px 14px rgba(70,60,120,.04),
        inset 0 1px 0 rgba(255,255,255,.7);
}
.loading-note.show{
    display:block;
}

.debug-indicator{
    display:none;
    margin-bottom:8px;
    padding:7px 10px;
    border-radius:999px;
    background:rgba(255,255,255,.84);
    color:#6f76bf;
    font-size:12px;
    font-weight:800;
    letter-spacing:.3px;
    text-align:center;
    box-shadow:
        0 6px 14px rgba(70,60,120,.08),
        inset 0 1px 0 rgba(255,255,255,.7);
}
.debug-indicator.show{
    display:block;
}

.milestone-wrap{
    position:absolute;
    top:36px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    pointer-events:none;
    z-index:300;
}
.milestone{
    padding:10px 16px;
    border-radius:999px;
    background:rgba(255,255,255,.92);
    color:#666f98;
    font-size:14px;
    font-weight:800;
    letter-spacing:.2px;
    box-shadow:
        0 10px 22px rgba(70,60,120,.12),
        inset 0 1px 0 rgba(255,255,255,.7);
    animation:milestonePop 1.05s ease forwards;
    backdrop-filter:blur(4px);
}
@keyframes milestonePop{
    0%{
        opacity:0;
        transform:translateY(10px) scale(.92);
    }
    18%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    82%{
        opacity:1;
        transform:translateY(0) scale(1);
    }
    100%{
        opacity:0;
        transform:translateY(-18px) scale(1.02);
    }
}

.title-banner{
    width:100%;
    aspect-ratio:3.5 / 1;
    background-image:url('./images/img_title.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    border:none;
    border-radius:16px;
    margin-bottom:8px;
    box-shadow:
        0 12px 22px rgba(84,96,156,.12),
        inset 0 1px 0 rgba(255,255,255,.24);
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
    appearance:none;
    -webkit-appearance:none;
}
.title-banner:hover{
    filter:brightness(1.02) saturate(1.03);
}
.title-banner:active{
    transform:scale(.992);
}
.title-banner:focus-visible{
    outline:none;
    box-shadow:
        0 0 0 3px rgba(255,255,255,.72),
        0 0 0 6px rgba(126,102,191,.24),
        0 12px 22px rgba(84,96,156,.12),
        inset 0 1px 0 rgba(255,255,255,.24);
}

.banner-desc{
    width:100%;
    margin-bottom:10px;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(255,255,255,.70);
    backdrop-filter:blur(4px);
    box-shadow:
        0 6px 16px rgba(82,66,140,.04),
        inset 0 1px 0 rgba(255,255,255,.74);
    font-size:13px;
    line-height:1.5;
    color:#70779b;
    text-align:center;
}

.top-panel{
    width:100%;
    display:flex;
    align-items:stretch;
    justify-content:space-between;
    gap:12px;
    margin-bottom:12px;
}

.score-card{
    flex:1;
    position:relative;
    overflow:hidden;
    background:linear-gradient(180deg, var(--panel1) 0%, var(--panel2) 100%);
    border-radius:16px;
    padding:12px 14px;
    min-height:72px;
    box-shadow:
        0 10px 18px rgba(88,98,160,.14),
        inset 0 1px 0 rgba(255,255,255,.22);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
.score-card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:46%;
    background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0));
    pointer-events:none;
}
.score-label{
    font-size:12px;
    font-weight:bold;
    color:var(--panel-label);
    letter-spacing:.5px;
    margin-bottom:6px;
    position:relative;
    z-index:1;
}
.score-value{
    font-size:26px;
    line-height:1;
    font-weight:bold;
    color:var(--panel-value);
    position:relative;
    z-index:1;
    text-shadow:0 2px 5px rgba(74, 60, 112, .14);
}

.best-burst{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    border-radius:16px;
    z-index:2;
}
.best-burst-piece{
    position:absolute;
    left:50%;
    top:56%;
    width:8px;
    height:8px;
    border-radius:50%;
    background:
        radial-gradient(circle at 35% 35%, #ffffff 0 28%, #efe7ff 35%, #cbb8ff 72%, rgba(203,184,255,0) 73%);
    opacity:0;
    transform:translate(-50%, -50%) scale(.55);
    animation:bestBurst 620ms ease-out forwards;
    box-shadow:
        0 0 10px rgba(255,255,255,.68),
        0 0 18px rgba(213,186,255,.52);
}
@keyframes bestBurst{
    0%{
        opacity:0;
        transform:
            translate(-50%, -50%)
            rotate(var(--ang))
            translateX(0px)
            scale(.45);
        filter:blur(.2px);
    }
    16%{
        opacity:1;
    }
    100%{
        opacity:0;
        transform:
            translate(-50%, -50%)
            rotate(var(--ang))
            translateX(var(--dist))
            scale(1.15);
        filter:blur(.6px);
    }
}

.score-gain{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    padding:8px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.95);
    color:#7b6fd3;
    font-weight:900;
    font-size:18px;
    line-height:1;
    box-shadow:
        0 10px 22px rgba(85, 76, 140, .16),
        inset 0 1px 0 rgba(255,255,255,.9);
    opacity:0;
    pointer-events:none;
    z-index:5;
    white-space:nowrap;
}
.score-gain.show{
    animation:gainFloat .72s cubic-bezier(.18,.78,.24,1) forwards;
}
@keyframes gainFloat{
    0%{
        opacity:0;
        transform:translate(-50%, -26%) scale(.84);
    }
    18%{
        opacity:1;
        transform:translate(-50%, -50%) scale(1.02);
    }
    100%{
        opacity:0;
        transform:translate(-50%, -118%) scale(1.06);
    }
}

#boardWrap{
    position:relative;
    width:100%;
}

.board-shell{
    position:relative;
    width:100%;
    aspect-ratio:1 / 1;
    padding:var(--gap);
    border-radius:22px;
    background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,0) 18%),
        linear-gradient(180deg, var(--board) 0%, var(--board-dark) 100%);
    box-shadow:
        0 12px 20px rgba(84,96,156,.12),
        inset 0 1px 0 rgba(255,255,255,.18);
}

.grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    grid-template-rows:repeat(4, 1fr);
    gap:var(--gap);
    width:100%;
    height:100%;
}
.cell{
    border-radius:var(--tile-radius);
    background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06)),
        rgba(255,255,255,.20);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.14),
        inset 0 -1px 0 rgba(120, 130, 180, .08);
}

#tiles, #animLayer{
    position:absolute;
    inset:var(--gap);
    pointer-events:none;
}

.tile, .anim-tile{
    position:absolute;
    border-radius:var(--tile-radius);
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    box-shadow:
        0 2px 5px rgba(66, 66, 94, .10),
        0 1px 0 rgba(255,255,255,.22) inset;
    overflow:visible;
    will-change:transform, opacity;
    backface-visibility:hidden;
    transform:translateZ(0);
}

.anim-tile{
    transition:
        transform var(--moveDur, 180ms) cubic-bezier(.22,.9,.3,1),
        opacity 90ms linear,
        filter 90ms linear;
    z-index:5;
}
.tile{
    z-index:2;
}
.tile-num{
    position:absolute;
    right:6px;
    bottom:6px;
    min-width:24px;
    height:24px;
    padding:0 7px;
    border-radius:999px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,.88);
    color:#4f557d;
    font-size:12px;
    font-weight:900;
    line-height:1;
    letter-spacing:.1px;
    box-shadow:
        0 3px 7px rgba(80,70,120,.14),
        inset 0 1px 0 rgba(255,255,255,.85);
    backdrop-filter:blur(2px);
}

.tile-merged{
    animation:mergePop 220ms cubic-bezier(.18,.82,.26,1.18);
    z-index:6;
}
@keyframes mergePop{
    0%{ transform:scale(0.92); }
    48%{ transform:scale(1.12); }
    100%{ transform:scale(1); }
}

.tile-merge-glow{
    position:absolute;
    inset:-9%;
    border-radius:calc(var(--tile-radius) + 8px);
    background:
        radial-gradient(circle at center,
            rgba(255,255,255,.56) 0%,
            rgba(255,255,255,.28) 34%,
            rgba(255,255,255,0) 72%);
    filter:blur(7px);
    pointer-events:none;
    animation:mergeGlowFade 240ms ease-out forwards;
}
@keyframes mergeGlowFade{
    0%{ opacity:0; transform:scale(.92); }
    25%{ opacity:.95; transform:scale(1.08); }
    100%{ opacity:0; transform:scale(1.14); }
}

.tile-merge-ring{
    position:absolute;
    inset:-3px;
    border-radius:calc(var(--tile-radius) + 4px);
    border:2px solid rgba(255,255,255,.72);
    box-shadow:
        0 0 0 1px rgba(255,255,255,.14) inset,
        0 0 14px rgba(255,255,255,.34);
    pointer-events:none;
    animation:mergeRingFade 230ms ease-out forwards;
}
@keyframes mergeRingFade{
    0%{ opacity:0; transform:scale(.86); }
    28%{ opacity:.92; transform:scale(1.06); }
    100%{ opacity:0; transform:scale(1.14); }
}

.hint{
    font-size:12px;
    color:var(--sub);
    text-align:center;
    margin-top:12px;
    line-height:1.5;
}

.overlay{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:50;
    background:rgba(244,246,255,.44);
    backdrop-filter:blur(5px);
    border-radius:22px;
}

.modal{
    position:relative;
    width:min(100%, 360px);
    border-radius:24px;
    padding:18px 18px 16px;
    background:
        linear-gradient(180deg, rgba(255,255,255,.97), rgba(247,248,255,.95));
    box-shadow:
        0 18px 38px rgba(72,74,120,.18),
        inset 0 1px 0 rgba(255,255,255,.92);
    text-align:center;
    color:#636989;
}

.result-tile-wrap{
    position:relative;
    width:min(48vw, 168px);
    aspect-ratio:1 / 1;
    margin:4px auto 14px;
    border-radius:22px;
    overflow:visible;
}
.result-tile{
    position:absolute;
    inset:0;
    border-radius:22px;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    box-shadow:
        0 16px 28px rgba(84,96,156,.16),
        inset 0 1px 0 rgba(255,255,255,.28);
}
.result-frame{
    position:absolute;
    inset:-3px;
    border-radius:24px;
    pointer-events:none;
    overflow:visible;
}
.result-frame::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:24px;
    padding:2px;
    background:
        linear-gradient(90deg,
            rgba(255,231,163,.40) 0%,
            rgba(255,216,106,.72) 18%,
            rgba(255,243,198,.92) 32%,
            rgba(255,214,96,.82) 46%,
            rgba(255,228,146,.56) 62%,
            rgba(255,244,204,.88) 76%,
            rgba(255,211,92,.70) 88%,
            rgba(255,231,163,.40) 100%);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
    opacity:.96;
    box-shadow:
        0 0 0 1px rgba(255,232,160,.22),
        0 0 14px rgba(255,214,96,.34),
        0 0 28px rgba(255,214,96,.18);
}
.result-frame::after{
    content:"";
    position:absolute;
    inset:-1px;
    border-radius:24px;
    padding:2px;
    background:
        conic-gradient(
            from 0deg,
            rgba(255,255,255,0) 0deg,
            rgba(255,255,255,0) 290deg,
            rgba(255,251,230,.04) 308deg,
            rgba(255,250,220,.55) 325deg,
            rgba(255,243,181,.98) 340deg,
            rgba(255,252,230,.80) 352deg,
            rgba(255,255,255,0) 360deg
        );
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
    filter:
        drop-shadow(0 0 6px rgba(255,238,170,.78))
        drop-shadow(0 0 14px rgba(255,216,106,.54))
        drop-shadow(0 0 24px rgba(255,216,106,.30));
    animation:resultFrameSweep 2.2s linear infinite;
    transform-origin:center;
}
@keyframes resultFrameSweep{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}

.frame-particles{
    position:absolute;
    inset:-16px;
    pointer-events:none;
    overflow:visible;
}
.frame-star{
    position:absolute;
    width:14px;
    height:14px;
    opacity:0;
    filter:
        drop-shadow(0 0 6px rgba(255,226,138,.56))
        drop-shadow(0 0 12px rgba(255,245,210,.26));
    animation:starTwinkle var(--dur, 2.1s) ease-in-out infinite;
    animation-delay:var(--delay, 0s);
    transform:translate(-50%, -50%) scale(var(--scale, 1));
}
.frame-star::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(90deg,
            transparent 0 42%,
            rgba(255,250,223,.96) 42% 58%,
            transparent 58% 100%),
        linear-gradient(0deg,
            transparent 0 42%,
            rgba(255,236,173,.94) 42% 58%,
            transparent 58% 100%);
    clip-path:polygon(50% 0%, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0% 50%, 39% 39%);
    border-radius:2px;
}
@keyframes starTwinkle{
    0%, 100%{
        opacity:0;
        transform:translate(-50%, -50%) scale(calc(var(--scale, 1) * .72)) rotate(0deg);
    }
    24%{
        opacity:.95;
        transform:translate(-50%, -50%) scale(calc(var(--scale, 1) * 1.06)) rotate(18deg);
    }
    55%{
        opacity:.72;
        transform:translate(-50%, -50%) scale(var(--scale, 1)) rotate(36deg);
    }
}

.modal-title{
    margin:0 0 10px;
    font-size:24px;
    line-height:1.25;
    font-weight:900;
    color:#656b90;
}
.modal-sub{
    margin:0 0 12px;
    font-size:16px;
    line-height:1.45;
    color:#767da3;
    font-weight:800;
}

.result-badge{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    min-height:48px;
    padding:12px 14px;
    margin:0 0 10px;
    border:none;
    border-radius:999px;
    background:linear-gradient(180deg, #c6b9f6 0%, #b3a5ef 100%);
    color:#ffffff;
    font-size:17px;
    font-weight:900;
    line-height:1.2;
    letter-spacing:.1px;
    box-shadow:
        0 10px 20px rgba(110,100,180,.14),
        inset 0 1px 0 rgba(255,255,255,.24);
}

.info-row{
    display:flex;
    gap:10px;
    margin-top:8px;
}
.info-pill{
    flex:1;
    border:none;
    border-radius:16px;
    padding:12px 10px;
    background:rgba(189,180,238,.18);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.72),
        0 6px 16px rgba(82,66,140,.04);
}
.info-pill-label{
    display:block;
    font-size:12px;
    color:#8a90b0;
    font-weight:800;
    margin-bottom:6px;
    letter-spacing:.3px;
}
.info-pill-value{
    display:block;
    font-size:22px;
    line-height:1;
    font-weight:900;
    color:#6b72a1;
}

.modal-actions{
    margin-top:14px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.action-btn{
    width:100%;
    min-height:54px;
    border:none;
    border-radius:999px;
    font-size:17px;
    font-weight:900;
    letter-spacing:.2px;
    cursor:pointer;
    appearance:none;
    -webkit-appearance:none;
    transition:transform .10s ease, filter .12s ease, box-shadow .12s ease, opacity .12s ease;
}
.action-btn:active{
    transform:scale(.992);
}
.action-btn.primary{
    background:linear-gradient(180deg, #ffbfd5 0%, #f59cc1 100%);
    color:#ffffff;
    box-shadow:
        0 12px 22px rgba(237,139,185,.26),
        inset 0 1px 0 rgba(255,255,255,.28);
}
.action-btn.secondary{
    background:linear-gradient(180deg, #ffffff 0%, #f4f6ff 100%);
    color:#7b82ab;
    box-shadow:
        0 10px 18px rgba(84,96,156,.10),
        inset 0 1px 0 rgba(255,255,255,.88);
}
.action-btn.attention{
    animation:buttonPulse 1.5s ease-in-out infinite;
}
@keyframes buttonPulse{
    0%{
        transform:scale(1);
        box-shadow:
            0 12px 22px rgba(237,139,185,.22),
            inset 0 1px 0 rgba(255,255,255,.28);
    }
    50%{
        transform:scale(1.008);
        box-shadow:
            0 14px 26px rgba(237,139,185,.26),
            inset 0 1px 0 rgba(255,255,255,.30);
    }
    100%{
        transform:scale(1);
        box-shadow:
            0 12px 22px rgba(237,139,185,.22),
            inset 0 1px 0 rgba(255,255,255,.28);
    }
}

.footer-space{
    height:2px;
}

@media (max-width:420px){
    .score-value{ font-size:24px; }
    .modal-title{ font-size:22px; }
    .modal-sub{ font-size:15px; }
    .action-btn{ font-size:16px; }
}
</style>
</head>
<body>
<div id="app">
    <div class="milestone-wrap" id="milestoneWrap"></div>

    <div class="version-note">KEY 2048 · v1</div>

    <div class="loading-note" id="loadingNote">
        타일 이미지를 불러오는 중이에요...
    </div>

    <div class="debug-indicator" id="debugIndicator"></div>

    <button class="title-banner" id="titleBanner" aria-label="KEY 2048"></button>

    <div class="banner-desc">
        상하좌우로 밀어 같은 숫자를 합쳐 2048을 만들어보세요!
    </div>

    <div class="top-panel">
        <div class="score-card">
            <div class="score-label">SCORE</div>
            <div class="score-value" id="score">0</div>
            <div class="best-burst" id="scoreGainWrap">
                <div class="score-gain" id="scoreGain">+0</div>
            </div>
        </div>
        <div class="score-card">
            <div class="score-label">BEST</div>
            <div class="score-value" id="best">0</div>
            <div class="best-burst" id="bestBurst"></div>
        </div>
    </div>

    <div id="boardWrap">
        <div class="board-shell" id="boardShell">
            <div class="grid" id="grid"></div>
            <div id="tiles"></div>
            <div id="animLayer"></div>

            <div class="overlay" id="winOverlay">
                <div class="modal">
                    <div class="result-tile-wrap">
                        <div class="result-tile" id="winTile"></div>
                        <div class="result-frame">
                            <div class="frame-particles" id="winParticles"></div>
                        </div>
                    </div>

                    <h2 class="modal-title">축하해요!</h2>
                    <p class="modal-sub">2048 타일을 완성했어요</p>

                    <button class="result-badge" id="winBadge">2048 타일을 완성했어요</button>

                    <div class="modal-actions">
                        <button class="action-btn primary attention" onclick="restart()">더 높은 점수에 도전하시겠어요?</button>
                        <button class="action-btn secondary" onclick="copyResult('win')">공유</button>
                    </div>
                </div>
            </div>

            <div class="overlay" id="gameOverOverlay">
                <div class="modal">
                    <div class="result-tile-wrap">
                        <div class="result-tile" id="gameOverTile"></div>
                        <div class="result-frame">
                            <div class="frame-particles" id="gameOverParticles"></div>
                        </div>
                    </div>

                    <h2 class="modal-title">아쉬워요!</h2>
                    <p class="modal-sub">이번 판은 여기까지예요</p>

                    <button class="result-badge" id="gameOverTileBadge">최고 타일</button>

                    <div class="info-row">
                        <div class="info-pill">
                            <span class="info-pill-label">이번 점수</span>
                            <span class="info-pill-value" id="gameOverScore">0</span>
                        </div>
                        <div class="info-pill">
                            <span class="info-pill-label">BEST</span>
                            <span class="info-pill-value" id="gameOverBest">0</span>
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button class="action-btn primary attention" onclick="restart()">더 높은 점수에 도전하시겠어요?</button>
                        <button class="action-btn secondary" onclick="copyResult('lose')">공유</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="hint">
        방향키 또는 스와이프로 플레이할 수 있어요.
    </div>

    <div class="footer-space"></div>
</div>

<script>
const SIZE = 4;
const CELL_GAP = 10;

const MOVE_MS = 150;
const MOVE_MS_STEP = 22;
const MOVE_MS_MAX = 230;

let board = [];
let score = 0;
let best = Number(localStorage.getItem("bestScore") || 0);
let bestJustUpdated = false;

let moving = false;
let wonShown = false;

let startX = 0;
let startY = 0;
let trackingTouch = false;

let cellWidth = 0;
let cellHeight = 0;

let lastSpawn = null;
let mergeCells = [];
let achievedMilestones = new Set();

const milestoneValues = [64, 128, 256, 512, 1024, 2048];

const app = document.getElementById("app");
const gridEl = document.getElementById("grid");
const tilesEl = document.getElementById("tiles");
const animLayer = document.getElementById("animLayer");
const boardShell = document.getElementById("boardShell");

const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const bestBurstEl = document.getElementById("bestBurst");
const scoreGainEl = document.getElementById("scoreGain");

const loadingNoteEl = document.getElementById("loadingNote");
const debugIndicatorEl = document.getElementById("debugIndicator");
const milestoneWrapEl = document.getElementById("milestoneWrap");

const winOverlay = document.getElementById("winOverlay");
const gameOverOverlay = document.getElementById("gameOverOverlay");

const winTile = document.getElementById("winTile");
const winBadge = document.getElementById("winBadge");
const winParticles = document.getElementById("winParticles");

const gameOverTile = document.getElementById("gameOverTile");
const gameOverTileBadge = document.getElementById("gameOverTileBadge");
const gameOverScore = document.getElementById("gameOverScore");
const gameOverBest = document.getElementById("gameOverBest");
const gameOverParticles = document.getElementById("gameOverParticles");

function emptyBoard(){
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
}

function setBadge(el, text){
    el.textContent = text;
}

function setupGrid(){
    gridEl.innerHTML = "";
    for(let i = 0; i < SIZE * SIZE; i++){
        const cell = document.createElement("div");
        cell.className = "cell";
        gridEl.appendChild(cell);
    }
}

function measureCells(){
    const boardRect = boardShell.getBoundingClientRect();
    const inner = boardRect.width - CELL_GAP * 2;
    cellWidth = (inner - CELL_GAP * (SIZE - 1)) / SIZE;
    cellHeight = cellWidth;
}

function pos(r, c){
    return {
        top: r * (cellHeight + CELL_GAP),
        left: c * (cellWidth + CELL_GAP)
    };
}

function showDebug(text){
    if(!text){
        debugIndicatorEl.classList.remove("show");
        debugIndicatorEl.textContent = "";
        return;
    }
    debugIndicatorEl.textContent = text;
    debugIndicatorEl.classList.add("show");
}

function showLoading(show){
    loadingNoteEl.classList.toggle("show", !!show);
}

function showMilestone(text){
    milestoneWrapEl.innerHTML = "";
    const el = document.createElement("div");
    el.className = "milestone";
    el.textContent = text;
    milestoneWrapEl.appendChild(el);
    setTimeout(() => {
        if(el.parentNode === milestoneWrapEl){
            milestoneWrapEl.innerHTML = "";
        }
    }, 1100);
}

function celebrateBest(){
    bestBurstEl.innerHTML = "";
    const count = 14;

    for(let i = 0; i < count; i++){
        const p = document.createElement("div");
        p.className = "best-burst-piece";
        const angle = (360 / count) * i + (Math.random() * 8 - 4);
        const dist = 30 + Math.random() * 18;
        const size = 6 + Math.random() * 6;
        p.style.setProperty("--ang", angle + "deg");
        p.style.setProperty("--dist", dist + "px");
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.animationDelay = (Math.random() * 70) + "ms";
        bestBurstEl.appendChild(p);
    }

    setTimeout(() => {
        bestBurstEl.innerHTML = "";
    }, 760);
}

function showScoreGain(amount){
    if(!amount) return;
    scoreGainEl.textContent = "+" + amount;
    scoreGainEl.classList.remove("show");
    void scoreGainEl.offsetWidth;
    scoreGainEl.classList.add("show");
    setTimeout(() => scoreGainEl.classList.remove("show"), 760);
}

function updateScore(){
    scoreEl.innerText = String(score);

    const prevBest = best;

    if(score > best){
        best = score;
        bestJustUpdated = true;
        localStorage.setItem("bestScore", String(best));

        if(best > prevBest){
            celebrateBest();
        }
    }

    bestEl.innerText = String(best);
}

function appendTileNumberBadge(el, value){
    const badge = document.createElement("div");
    badge.className = "tile-num";
    badge.textContent = value;
    el.appendChild(badge);
}

function isMergeCell(r, c){
    return mergeCells.some(cell => cell.r === r && cell.c === c);
}

function renderBoard(){
    if(!cellWidth || !cellHeight) return;

    tilesEl.innerHTML = "";

    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            const value = board[r][c];
            if(!value) continue;

            const tile = document.createElement("div");
            tile.className = "tile";
            tile.dataset.r = String(r);
            tile.dataset.c = String(c);
            tile.style.width = cellWidth + "px";
            tile.style.height = cellHeight + "px";

            const p = pos(r, c);
            tile.style.top = p.top + "px";
            tile.style.left = p.left + "px";
            tile.style.backgroundImage = `url('./images/img_${value}.jpg')`;

            if(isMergeCell(r, c)){
                tile.classList.add("tile-merged");

                const glow = document.createElement("div");
                glow.className = "tile-merge-glow";
                tile.appendChild(glow);

                const ring = document.createElement("div");
                ring.className = "tile-merge-ring";
                tile.appendChild(ring);
            }

            appendTileNumberBadge(tile, value);
            tilesEl.appendChild(tile);
        }
    }
}

function setBaseTilesHiddenForAnimation(animations){
    const hiddenKeys = new Set();

    animations.forEach(a => {
        const actuallyMoves = a.fromR !== a.toR || a.fromC !== a.toC;
        if(actuallyMoves){
            hiddenKeys.add(`${a.fromR}-${a.fromC}`);
        }
    });

    tilesEl.querySelectorAll(".tile").forEach(tile => {
        const key = `${tile.dataset.r}-${tile.dataset.c}`;
        tile.style.opacity = hiddenKeys.has(key) ? "0" : "1";
    });
}

function restoreBaseTilesAfterAnimation(){
    tilesEl.querySelectorAll(".tile").forEach(tile => {
        tile.style.opacity = "1";
    });
}

function getEmptyCells(){
    const empty = [];
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] === 0) empty.push({ r, c });
        }
    }
    return empty;
}

function spawn(forceValue = null){
    const empty = getEmptyCells();
    if(empty.length === 0){
        lastSpawn = null;
        return;
    }

    const pick = empty[Math.floor(Math.random() * empty.length)];
    board[pick.r][pick.c] = forceValue ?? (Math.random() < 0.9 ? 2 : 4);
    lastSpawn = { r: pick.r, c: pick.c };
}

function has2048Tile(){
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] >= 2048) return true;
        }
    }
    return false;
}

function isGameOver(){
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] === 0) return false;
            if(c < SIZE - 1 && board[r][c] === board[r][c + 1]) return false;
            if(r < SIZE - 1 && board[r][c] === board[r + 1][c]) return false;
        }
    }
    return true;
}

function cloneBoard(src){
    return src.map(row => [...row]);
}

function linesEqual(a, b){
    for(let i = 0; i < a.length; i++){
        if(a[i] !== b[i]) return false;
    }
    return true;
}

function slideAndMergeLineDetailed(line){
    const items = [];
    for(let i = 0; i < line.length; i++){
        if(line[i] !== 0){
            items.push({ value: line[i], from: i });
        }
    }

    const result = Array(SIZE).fill(0);
    const moves = [];
    const merges = [];
    let gained = 0;
    let write = 0;

    for(let i = 0; i < items.length; i++){
        const cur = items[i];
        const next = items[i + 1];

        if(next && cur.value === next.value){
            const mergedValue = cur.value * 2;
            result[write] = mergedValue;
            gained += mergedValue;

            moves.push({
                from: cur.from,
                to: write,
                value: cur.value,
                merged: true,
                fadeLate: false
            });
            moves.push({
                from: next.from,
                to: write,
                value: next.value,
                merged: true,
                fadeLate: true
            });

            merges.push({
                index: write,
                value: mergedValue
            });

            i++;
            write++;
        }else{
            result[write] = cur.value;
            moves.push({
                from: cur.from,
                to: write,
                value: cur.value,
                merged: false,
                fadeLate: false
            });
            write++;
        }
    }

    return {
        line: result,
        gained,
        moves,
        merges
    };
}

function buildMoveResult(dir){
    const oldBoard = cloneBoard(board);
    const newBoard = emptyBoard();
    const animations = [];
    const mergedCellsOut = [];
    let moved = false;
    let gainedTotal = 0;

    if(dir === "ArrowLeft" || dir === "ArrowRight"){
        for(let r = 0; r < SIZE; r++){
            const original = [...oldBoard[r]];
            const working = dir === "ArrowLeft" ? [...original] : [...original].reverse();
            const res = slideAndMergeLineDetailed(working);
            const finalLine = dir === "ArrowLeft" ? res.line : [...res.line].reverse();

            newBoard[r] = finalLine;
            gainedTotal += res.gained;

            if(!linesEqual(original, finalLine)) moved = true;

            res.moves.forEach(m => {
                const fromC = dir === "ArrowLeft" ? m.from : (SIZE - 1 - m.from);
                const toC = dir === "ArrowLeft" ? m.to : (SIZE - 1 - m.to);

                animations.push({
                    fromR: r,
                    fromC,
                    toR: r,
                    toC,
                    value: m.value,
                    merged: m.merged,
                    fadeLate: m.fadeLate
                });
            });

            res.merges.forEach(m => {
                const c = dir === "ArrowLeft" ? m.index : (SIZE - 1 - m.index);
                mergedCellsOut.push({ r, c });
            });
        }
    }else{
        for(let c = 0; c < SIZE; c++){
            const original = [];
            for(let r = 0; r < SIZE; r++) original.push(oldBoard[r][c]);

            const working = dir === "ArrowUp" ? [...original] : [...original].reverse();
            const res = slideAndMergeLineDetailed(working);
            const finalCol = dir === "ArrowUp" ? res.line : [...res.line].reverse();

            for(let r = 0; r < SIZE; r++) newBoard[r][c] = finalCol[r];
            gainedTotal += res.gained;

            if(!linesEqual(original, finalCol)) moved = true;

            res.moves.forEach(m => {
                const fromR = dir === "ArrowUp" ? m.from : (SIZE - 1 - m.from);
                const toR = dir === "ArrowUp" ? m.to : (SIZE - 1 - m.to);

                animations.push({
                    fromR,
                    fromC: c,
                    toR,
                    toC: c,
                    value: m.value,
                    merged: m.merged,
                    fadeLate: m.fadeLate
                });
            });

            res.merges.forEach(m => {
                const r = dir === "ArrowUp" ? m.index : (SIZE - 1 - m.index);
                mergedCellsOut.push({ r, c });
            });
        }
    }

    return {
        newBoard,
        animations,
        mergeCells: mergedCellsOut,
        gained: gainedTotal,
        moved
    };
}

function getMoveDuration(fromR, fromC, toR, toC){
    const steps = Math.max(Math.abs(toR - fromR), Math.abs(toC - fromC));
    return Math.min(MOVE_MS_MAX, MOVE_MS + Math.max(0, steps - 1) * MOVE_MS_STEP);
}

function createAnimTile(value, r, c){
    const el = document.createElement("div");
    el.className = "anim-tile";
    el.style.width = cellWidth + "px";
    el.style.height = cellHeight + "px";

    const p = pos(r, c);
    el.style.top = p.top + "px";
    el.style.left = p.left + "px";
    el.style.backgroundImage = `url('./images/img_${value}.jpg')`;
    el.style.transform = "translate3d(0,0,0)";

    appendTileNumberBadge(el, value);
    animLayer.appendChild(el);
    return el;
}

function playMoveAnimation(animations, onDone){
    animLayer.innerHTML = "";

    const effectiveAnimations = animations.filter(a =>
        a.fromR !== a.toR || a.fromC !== a.toC
    );

    if(effectiveAnimations.length === 0){
        onDone();
        return;
    }

    setBaseTilesHiddenForAnimation(effectiveAnimations);

    const animTiles = effectiveAnimations.map(a => {
        const el = createAnimTile(a.value, a.fromR, a.fromC);
        const duration = getMoveDuration(a.fromR, a.fromC, a.toR, a.toC);
        el.style.setProperty("--moveDur", duration + "ms");
        return { el, duration, ...a };
    });

    const maxDuration = Math.max(...animTiles.map(a => a.duration));

    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            animTiles.forEach(a => {
                const from = pos(a.fromR, a.fromC);
                const to = pos(a.toR, a.toC);
                const dx = to.left - from.left;
                const dy = to.top - from.top;
                a.el.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;

                if(a.merged){
                    a.el.style.filter = "brightness(1.04)";
                }
            });
        });
    });

    animTiles.forEach(a => {
        if(a.merged){
            setTimeout(() => {
                a.el.style.opacity = a.fadeLate ? "0" : "0.18";
                a.el.style.filter = "brightness(1.10)";
            }, Math.max(80, a.duration - 26));
        }
    });

    setTimeout(() => {
        animLayer.innerHTML = "";
        restoreBaseTilesAfterAnimation();
        onDone();
    }, maxDuration + 28);
}

function move(dir){
    if(moving) return;
    if(winOverlay.style.display === "flex") return;
    if(gameOverOverlay.style.display === "flex") return;

    moving = true;
    lastSpawn = null;
    mergeCells = [];

    const res = buildMoveResult(dir);

    if(!res.moved){
        moving = false;
        return;
    }

    score += res.gained;
    updateScore();
    showScoreGain(res.gained);

    playMoveAnimation(res.animations, () => {
        board = res.newBoard;
        mergeCells = res.mergeCells;

        spawn();
        renderBoard();

        checkMilestonesFromBoard();

        setTimeout(() => {
            mergeCells = [];
            renderBoard();
        }, 260);

        if(!wonShown && has2048Tile()){
            wonShown = true;
            showWin();
        }else if(isGameOver()){
            showGameOver();
        }

        moving = false;
    });
}

async function copyText(text){
    try{
        await navigator.clipboard.writeText(text);
        showMilestone("복사 완료!");
    }catch(e){
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        showMilestone("복사 완료!");
    }
}

function buildResultText(mode){
    return "https://anykey0923.github.io/KEY2048/v1/";
}

function copyResult(mode){
    copyText(buildResultText(mode));
}

function restart(){
    hideOverlays();
    animLayer.innerHTML = "";
    tilesEl.style.visibility = "visible";
    milestoneWrapEl.innerHTML = "";

    setBadge(gameOverTileBadge, "");
    setBadge(gameOverBadge, "");

    board = emptyBoard();
    score = 0;
    wonShown = false;
    moving = false;
    lastSpawn = null;
    mergeCells = [];
    trackingTouch = false;
    achievedMilestones = new Set();
    bestJustUpdated = false;

    updateScore();
    spawn();
    spawn();
    renderBoard();
}

function getHighestTile(){
    let max = 0;
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] > max) max = board[r][c];
        }
    }
    return max;
}

function ensureParticles(container){
    if(!container) return;
    container.innerHTML = "";

    const stars = [
        { x:"50%", y:"-6px", s:1.00, d:0.00, dur:2.0 },
        { x:"102%", y:"16%", s:1.18, d:0.18, dur:2.3 },
        { x:"106%", y:"64%", s:0.88, d:0.46, dur:2.15 },
        { x:"84%", y:"103%", s:1.30, d:0.28, dur:2.45 },
        { x:"42%", y:"108%", s:0.94, d:0.62, dur:1.95 },
        { x:"-6%", y:"78%", s:1.14, d:0.22, dur:2.25 },
        { x:"-10%", y:"32%", s:0.78, d:0.54, dur:1.85 },
        { x:"18%", y:"-10%", s:1.26, d:0.36, dur:2.35 }
    ];

    stars.forEach(star => {
        const el = document.createElement("div");
        el.className = "frame-star";
        el.style.left = star.x;
        el.style.top = star.y;
        el.style.setProperty("--scale", star.s);
        el.style.setProperty("--delay", star.d + "s");
        el.style.setProperty("--dur", star.dur + "s");
        container.appendChild(el);
    });
}

function hideOverlays(){
    winOverlay.style.display = "none";
    gameOverOverlay.style.display = "none";
}

function showWin(){
    const highest = 2048;
    winTile.style.backgroundImage = `url('./images/img_${highest}.jpg')`;
    setBadge(winBadge, "2048 타일을 완성했어요");
    ensureParticles(winParticles);
    winOverlay.style.display = "flex";
}

function showGameOver(){
    const highest = getHighestTile();
    const clamped = Math.min(highest || 2, 2048);
    gameOverTile.style.backgroundImage = `url('./images/img_${clamped}.jpg')`;
    setBadge(gameOverTileBadge, `${clamped} 타일을 완성했어요`);
    gameOverScore.textContent = String(score);
    gameOverBest.textContent = String(best);
    ensureParticles(gameOverParticles);
    gameOverOverlay.style.display = "flex";
}

function checkMilestonesFromBoard(){
    let highest = 0;
    for(let r = 0; r < SIZE; r++){
        for(let c = 0; c < SIZE; c++){
            if(board[r][c] > highest) highest = board[r][c];
        }
    }

    milestoneValues.forEach(v => {
        if(highest >= v && !achievedMilestones.has(v)){
            achievedMilestones.add(v);
            if(v < 2048){
                showMilestone(`${v} 타일 달성!`);
            }
        }
    });
}

function handleKeydown(e){
    const keys = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"];
    if(!keys.includes(e.key)) return;
    e.preventDefault();
    move(e.key);
}

function onTouchStart(e){
    if(e.touches.length !== 1) return;
    const t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
    trackingTouch = true;
}

function onTouchMove(e){
    if(trackingTouch) e.preventDefault();
}

function onTouchEnd(e){
    if(!trackingTouch) return;
    trackingTouch = false;

    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;

    if(Math.abs(dx) < 24 && Math.abs(dy) < 24) return;

    if(Math.abs(dx) > Math.abs(dy)){
        move(dx > 0 ? "ArrowRight" : "ArrowLeft");
    }else{
        move(dy > 0 ? "ArrowDown" : "ArrowUp");
    }
}

function preloadImages(){
    const values = [2,4,8,16,32,64,128,256,512,1024,2048];
    const urls = [
        "./images/img_title.jpg",
        ...values.map(v => `./images/img_${v}.jpg`)
    ];

    showLoading(true);

    return Promise.all(urls.map(src => new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve({ src, ok:true });
        img.onerror = () => resolve({ src, ok:false });
        img.src = src;
    }))).then(results => {
        showLoading(false);
        const failed = results.filter(r => !r.ok).map(r => r.src);
        if(failed.length){
            showDebug("일부 이미지 로드 실패");
            console.warn("Failed images:", failed);
        }else{
            showDebug("");
        }
    });
}

function resizeBoard(){
    measureCells();
    renderBoard();
}

const titleBanner = document.getElementById("titleBanner");
titleBanner.addEventListener("click", () => {
    showMilestone("KEY 2048!");
});

window.addEventListener("keydown", handleKeydown, { passive:false });
app.addEventListener("touchstart", onTouchStart, { passive:true });
app.addEventListener("touchmove", onTouchMove, { passive:false });
app.addEventListener("touchend", onTouchEnd, { passive:true });
window.addEventListener("resize", resizeBoard);

setupGrid();
bestEl.textContent = String(best);

preloadImages().finally(() => {
    resizeBoard();
    restart();
});
</script>
</body>
