<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
:root{
    --board-size:min(92vw,420px);

    /* 톤다운 연보라 */
    --bg1:#eee9f6;
    --bg2:#e3dcf0;

    --board:#c8c0df;
    --board-dark:#b5acd3;

    --panel1:#bfb5de;
    --panel2:#a99fd0;

    --panel-label:#f4f1ff;
    --panel-value:#ffffff;

    --text:#5e587a;
    --sub:#7a7398;

    --gap:10px;
    --pad:10px;
}
*{ box-sizing:border-box; }
html, body{
    margin:0;
    min-height:100%;
}
body{
    background:
        radial-gradient(circle at top, #faf8ff 0%, var(--bg1) 35%, var(--bg2) 100%);
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:18px 0;
    touch-action:none;
    color:var(--text);
}
#app{
    width:var(--board-size);
    display:flex;
    flex-direction:column;
}
.version-note{
    font-size:12px;
    color:#8a82a6;
    text-align:center;
    margin-bottom:8px;
}

/* 배너 */
.title-banner{
    width:100%;
    height:84px;
    background:url('./images/img_title.jpg') center/cover no-repeat;
    border-radius:16px;
    margin-bottom:10px;
    box-shadow:0 12px 22px rgba(70,60,120,.12);
}

/* 설명 */
.banner-desc{
    margin-bottom:14px;
    padding:10px;
    border-radius:12px;
    background:rgba(255,255,255,.32);
    backdrop-filter:blur(4px);
    font-size:13px;
    text-align:center;
    color:var(--sub);
}

/* 점수판 */
.top-panel{
    display:flex;
    gap:12px;
    margin-bottom:14px;
}
.score-card{
    flex:1;
    background:linear-gradient(180deg, var(--panel1), var(--panel2));
    border-radius:14px;
    padding:12px;
    text-align:center;
    box-shadow:0 8px 16px rgba(70,60,120,.12);
}
.score-label{
    font-size:12px;
    color:var(--panel-label);
}
.score-value{
    font-size:26px;
    font-weight:bold;
    color:white;
}

/* 보드 */
#board{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    box-sizing:border-box;
    background:
        linear-gradient(180deg, #dcd5f0 0%, var(--board) 50%, var(--board-dark) 100%);
    padding:var(--pad);
    border-radius:20px;
    box-shadow:0 16px 30px rgba(70,60,120,.15);
    overflow:hidden;
}

/* 배경 그리드 */
.grid{
    position:absolute;
    top:var(--pad);
    left:var(--pad);
    right:var(--pad);
    bottom:var(--pad);
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:var(--gap);
}
.cell{
    background:rgba(255,255,255,.35);
    border-radius:8px;
}

/* 타일 레이어 */
#tiles,#anim-layer{
    position:absolute;
    top:var(--pad);
    left:var(--pad);
    right:var(--pad);
    bottom:var(--pad);
}

/* 타일 */
.tile,.anim-tile{
    position:absolute;
    border-radius:8px;
    background-size:cover;
    background-position:center;
}
.anim-tile{
    transition:all .14s ease;
}

/* 애니메이션 */
.tile-new{
    animation:pop .14s;
}
@keyframes pop{
    from{transform:scale(0);}
    to{transform:scale(1);}
}
.tile-merge{
    animation:merge .2s;
}
@keyframes merge{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

/* 오버레이 */
.overlay{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(60,50,100,.6);
    color:white;
}
.overlay-img{
    width:180px;height:180px;
    background-size:cover;
    border-radius:10px;
    margin-bottom:20px;
}
.overlay button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#f4f1ff;
}
</style>
</head>
<body>

<div id="app">
<div class="version-note">v2.3.0 톤다운 라벤더 UI</div>

<div class="title-banner"></div>
<div class="banner-desc">상하좌우로 밀어 2048을 만들어보세요</div>

<div class="top-panel">
<div class="score-card">
<div class="score-label">현재점수</div>
<div class="score-value" id="score">0</div>
</div>
<div class="score-card">
<div class="score-label">최고기록</div>
<div class="score-value" id="best">0</div>
</div>
</div>

<div id="board">
<div class="grid" id="bg"></div>
<div id="tiles"></div>
<div id="anim-layer"></div>

<div id="winoverlay" class="overlay">
<div id="win-img" class="overlay-img"></div>
<div>YOU WIN</div>
<button onclick="restart()">REPLAY</button>
</div>

<div id="gameover" class="overlay">
<div id="gameover-img" class="overlay-img"></div>
<div>GAME OVER</div>
<button onclick="restart()">REPLAY</button>
</div>

</div>
</div>

<script>
const SIZE=4,GAP=10;
let board=[],score=0,best=localStorage.best||0;
let cellW=0,cellH=0;
const tilesEl=document.getElementById("tiles");

function calc(){
const w=tilesEl.clientWidth;
const h=tilesEl.clientHeight;
cellW=(w-GAP*3)/4;
cellH=(h-GAP*3)/4;
render();
}

function pos(r,c){
return{
top:r*(cellH+GAP),
left:c*(cellW+GAP)
};
}

function render(){
tilesEl.innerHTML="";
for(let r=0;r<4;r++){
for(let c=0;c<4;c++){
if(!board[r][c])continue;
let d=document.createElement("div");
d.className="tile";
d.style.width=cellW+"px";
d.style.height=cellH+"px";
let p=pos(r,c);
d.style.top=p.top+"px";
d.style.left=p.left+"px";
d.style.backgroundImage=`url('./images/img_${board[r][c]}.jpg')`;
tilesEl.appendChild(d);
}
}
}

function spawn(){
let empty=[];
for(let r=0;r<4;r++)
for(let c=0;c<4;c++)
if(!board[r][c])empty.push({r,c});
if(!empty.length)return;
let {r,c}=empty[Math.random()*empty.length|0];
board[r][c]=Math.random()<.9?2:4;
}

function init(){
board=Array(4).fill().map(()=>Array(4).fill(0));
spawn();spawn();
calc();
window.onresize=calc;
}
init();
</script>

</body>
</html>
