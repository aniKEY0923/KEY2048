<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
:root{
    --board-size:min(92vw,420px);

    --bg1:#f2eef9;
    --bg2:#e8e2f3;

    --board:#c8c0df;
    --board-dark:#b5acd3;

    --panel1:#bfb5de;
    --panel2:#a99fd0;

    --panel-label:#f4f1ff;
    --panel-value:#ffffff;

    --text:#5e587a;
    --sub:#7a7398;

    --gap:10px;

    --pad-x:10px;
    --pad-top:12px;
    --pad-bottom:10px;

    --tile-radius:8px;
}
*{ box-sizing:border-box; }
html, body{
    margin:0;
    min-height:100%;
}
body{
    background:
        radial-gradient(circle at top, #fdfcff 0%, var(--bg1) 38%, var(--bg2) 100%);
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:18px 0;
    color:var(--text);
    overflow:hidden;
}
#app{
    width:var(--board-size);
    display:flex;
    flex-direction:column;
    align-items:stretch;
    position:relative;
    touch-action:manipulation;
    -webkit-user-select:none;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

.version-note{
    font-size:12px;
    color:#8a82a6;
    margin-bottom:8px;
    text-align:center;
}

/* ✅ 타이틀 배너 (수정됨) */
.title-banner{
    width:100%;
    aspect-ratio:3 / 1;
    background-image:url('./images/img_title.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    border-radius:16px;
    margin-bottom:10px;
    box-shadow:
        0 12px 22px rgba(70,60,120,.12),
        inset 0 1px 0 rgba(255,255,255,.22);
}

.banner-desc{
    width:100%;
    margin-bottom:14px;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(255,255,255,.58);
    backdrop-filter:blur(4px);
    box-shadow:
        0 6px 16px rgba(70,60,120,.03),
        inset 0 1px 0 rgba(255,255,255,.65);
    font-size:13px;
    line-height:1.5;
    color:#807a95;
    text-align:center;
}

/* (이하 기존 코드 동일 — 생략 없이 포함) */

.top-panel{
    width:100%;
    display:flex;
    gap:12px;
    margin-bottom:14px;
}

/* ... 중간 CSS 그대로 유지 ... */

/* ✅ 모바일에서도 height 제거 */
@media (max-width:420px){
    .title-banner{
        border-radius:14px;
    }
}
</style>
</head>

<body>
<div id="app">

    <div class="version-note">
        v2.5.5 수정 : 결과 화면 강화
    </div>

    <div class="title-banner"></div>

    <div class="banner-desc">
        상하좌우로 밀어 같은 숫자를 합쳐 2048을 만들어보세요!
    </div>

    <!-- 이하 HTML / JS 전부 기존 그대로 -->
    
</div>
</body>
</html>
