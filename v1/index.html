<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
:root{
    --board-size:min(92vw,420px);
    --bg1:#f4effd;
    --bg2:#e9def8;

    --board:#cbbce8;
    --board-dark:#b4a1db;

    --panel1:#c8b5ec;
    --panel2:#ae96de;

    --panel-label:#f7f3ff;
    --panel-value:#ffffff;

    --text:#5a4f84;
    --sub:#74679f;

    --gap:10px;

    --pad-x:10px;
    --pad-top:12px;
    --pad-bottom:10px;

    --tile-radius:8px;
}

*{ box-sizing:border-box; }

html,body{
    margin:0;
    min-height:100%;
    overflow-y:auto;
}

body{
    background:
        radial-gradient(circle at top, #fffefe 0%, var(--bg1) 36%, var(--bg2) 100%);
    font-family:Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:18px 0 24px;
    color:var(--text);
}

#app{
    width:var(--board-size);
    display:flex;
    flex-direction:column;
    touch-action:none;
}

.title-banner{
    width:100%;
    aspect-ratio:3.5/1;
    background:url('./images/img_title.jpg') center/cover no-repeat;
    border-radius:16px;
    margin-bottom:8px;
    cursor:pointer;
}

.banner-desc{
    margin-bottom:10px;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(255,255,255,.66);
    font-size:13px;
    color:#685b92;
    text-align:center;
}

.top-panel{
    display:flex;
    gap:12px;
    margin-bottom:12px;
}

.score-card{
    flex:1;
    background:linear-gradient(180deg, var(--panel1), var(--panel2));
    border-radius:16px;
    padding:12px;
    text-align:center;
}

.score-value{
    font-size:26px;
    font-weight:bold;
}

#board{
    position:relative;
    width:100%;
    aspect-ratio:1;
    background:linear-gradient(180deg, #d7c9f1, var(--board), var(--board-dark));
    border-radius:20px;
    overflow:hidden;
    touch-action:none;
}

.grid{
    position:absolute;
    inset:12px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.cell{
    background:rgba(241,242,248,.46);
    border-radius:8px;
}

#tiles,#anim-layer{
    position:absolute;
    inset:12px;
}

.tile,.anim-tile{
    position:absolute;
    border-radius:8px;
    background-size:cover;
}

.anim-tile{
    transition:
        top .18s cubic-bezier(.22,.61,.36,1),
        left .18s cubic-bezier(.22,.61,.36,1),
        opacity .18s ease;
}

</style>
</head>
<body>

<div id="app">

<div class="title-banner" onclick="restart()"></div>

<div class="banner-desc">
상하좌우로 밀어 같은 숫자를 합쳐 2048을 만들어보세요!
</div>

<div class="top-panel">
    <div class="score-card">
        <div>점수</div>
        <div id="score" class="score-value">0</div>
    </div>
</div>

<div id="board">
    <div class="grid" id="bg"></div>
    <div id="tiles"></div>
    <div id="anim-layer"></div>
</div>

</div>

<script>
const SIZE=4;
const GAP=10;
const MOVE_MS=180;

let board=[];
let score=0;

const boardEl=document.getElementById("board");
const tilesEl=document.getElementById("tiles");
const animLayer=document.getElementById("anim-layer");
const scoreEl=document.getElementById("score");
const bg=document.getElementById("bg");

let cellSize=0;

function init(){
    for(let i=0;i<16;i++){
        let d=document.createElement("div");
        d.className="cell";
        bg.appendChild(d);
    }
    restart();
}

function restart(){
    board=Array.from({length:4},()=>Array(4).fill(0));
    score=0;
    spawn(); spawn();
    calc();
    render();
}

function spawn(){
    let empty=[];
    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){
            if(!board[r][c]) empty.push({r,c});
        }
    }
    if(empty.length){
        let p=empty[Math.floor(Math.random()*empty.length)];
        board[p.r][p.c]=Math.random()<0.9?2:4;
    }
}

function calc(){
    let w=tilesEl.clientWidth;
    cellSize=(w-(SIZE-1)*GAP)/SIZE;
}

function pos(r,c){
    return{
        top:r*(cellSize+GAP),
        left:c*(cellSize+GAP)
    };
}

function render(){
    tilesEl.innerHTML="";
    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){
            let v=board[r][c];
            if(!v) continue;
            let t=document.createElement("div");
            t.className="tile";
            t.style.width=cellSize+"px";
            t.style.height=cellSize+"px";
            let p=pos(r,c);
            t.style.top=p.top+"px";
            t.style.left=p.left+"px";
            t.style.backgroundImage=`url('./images/img_${v}.jpg')`;
            tilesEl.appendChild(t);
        }
    }
    scoreEl.textContent=score;
}

function move(dir){
    let moved=false;
    let newBoard=Array.from({length:4},()=>Array(4).fill(0));

    function process(line){
        let arr=line.filter(v=>v);
        for(let i=0;i<arr.length-1;i++){
            if(arr[i]===arr[i+1]){
                arr[i]*=2;
                score+=arr[i];
                arr.splice(i+1,1);
            }
        }
        while(arr.length<4) arr.push(0);
        return arr;
    }

    for(let i=0;i<4;i++){
        let line;
        if(dir==="left"){
            line=board[i];
            let res=process(line);
            newBoard[i]=res;
        }
        if(dir==="right"){
            line=[...board[i]].reverse();
            let res=process(line).reverse();
            newBoard[i]=res;
        }
        if(dir==="up"){
            line=board.map(r=>r[i]);
            let res=process(line);
            for(let r=0;r<4;r++) newBoard[r][i]=res[r];
        }
        if(dir==="down"){
            line=board.map(r=>r[i]).reverse();
            let res=process(line).reverse();
            for(let r=0;r<4;r++) newBoard[r][i]=res[r];
        }
    }

    moved=JSON.stringify(board)!==JSON.stringify(newBoard);
    if(!moved) return;

    board=newBoard;
    spawn();
    render();
}

window.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft") move("left");
    if(e.key==="ArrowRight") move("right");
    if(e.key==="ArrowUp") move("up");
    if(e.key==="ArrowDown") move("down");
});

init();
</script>

</body>
</html>
